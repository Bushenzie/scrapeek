<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="stylesheet" href="/src/style.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scrapeek extension</title>
  </head>
  <body>
    <div class="flex flex-col gap-2 w-96">
      <div class="bg-blue-800">
        <h1 class="text-lg font-bold text-white w-full p-4">Scrapeek picker</h1>
      </div>
      <div class="p-4">
        <div class="flex flex-col gap-2">
          <label for="selector-input">Selector</label>
          <div class="flex w-full">
            <input
              type="text"
              id="selector-input"
              class="p-2 border w-full border-blue-800 rounded-l-sm outline-none fcous:outline-none read-only:text-black/70"
              readonly
            />
            <button
              class="bg-blue-800 text-white p-2 cursor-pointer rounded-r-sm hover:bg-blue-900"
              id="copy-btn"
            >
              Copy
            </button>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/popup.ts"></script>
  </body>
</html>
